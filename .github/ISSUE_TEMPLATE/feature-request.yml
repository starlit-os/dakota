name: "Feature request"
description: "Propose something new for Bluefin. Use the direct path or opt into the structured queue."
title: "[Feature]: "
labels: ["kind/enhancement"]
type: "Feature"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to propose something! 🐟
        Keep it short and practical. If you opt into **Raptor Current**, `actionadon` will route it through the structured queue. Otherwise it stays a normal issue.

  - type: checkboxes
    id: checks
    attributes:
      label: "Before submitting"
      options:
        - label: "I searched existing issues first"
          required: true

  - type: dropdown
    id: workflow-path
    attributes:
      label: "Workflow path"
      description: "Use the direct path by default. Pick Raptor Current only if you want the structured queue."
      options:
        - "Direct issue (skip workflow)"
        - "Raptor Current (structured + wrangler + agent queue)"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: "What problem are you solving?"
      description: "One paragraph. Plain language. What's broken, missing, or annoying today?"
      placeholder: "I keep having to manually push my local build to the zot registry because there's no just recipe for it..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "What do you propose?"
      description: "How should it work? What would done look like?"
      placeholder: "Add a `just push-local` recipe that wraps `podman push` with the lab registry URL pre-filled."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: "Affected area"
      description: "Pick the closest match."
      options:
        - "area/buildstream"
        - "area/gnome"
        - "area/brew"
        - "area/just"
        - "area/iso"
        - "area/dx"
        - "area/services"
        - "area/flatpak"
        - "area/nvidia"
        - "area/hardware"
        - "area/testing"
        - "area/upstream"
        - "area/policy"
        - "other"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        ### Acceptance criteria
        *Leave this blank unless you're preparing the issue for Raptor Current.*

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "Acceptance criteria"
      description: "Optional. For Raptor Current only. Use markdown checklist items (`- [ ] ...`)."
      placeholder: |
        - [ ] `just push-local` recipe exists and is documented in `just --list`
        - [ ] Recipe pushes to `localhost:5000` by default with `REGISTRY` override
        - [ ] `just validate` passes after the change
      render: markdown
    validations:
      required: false

  - type: textarea
    id: affected-elements
    attributes:
      label: "Extra context"
      description: "Optional. Link related issues, upstream references, or mention affected files/elements."
      placeholder: "Justfile only — no BST element changes"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        💡 After this feature ships, the community can verify it works with `ujust verify <issue-number>`.
