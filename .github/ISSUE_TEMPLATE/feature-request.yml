name: "Feature request"
description: "Propose something new for Bluefin. Use the direct path or opt into the structured queue."
title: "[Feature]: "
labels: ["kind/enhancement"]
type: "Feature"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to propose something! 🐟
        Write this in your own words — no AI-generated text for the top sections, please.
        If you opt into **Raptor Current**, `actionadon` will open the structured path for you. Otherwise this stays a normal issue.

  - type: dropdown
    id: workflow-path
    attributes:
      label: "Workflow path"
      description: "Choose the lighter direct path, or opt into Raptor Current for structured issue flow → approval → wrangler queue → agent claim."
      options:
        - "Direct issue (skip workflow)"
        - "Raptor Current (structured + wrangler + agent queue)"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: "What problem are you solving?"
      description: "One paragraph. Plain language. What's broken, missing, or annoying today?"
      placeholder: "I keep having to manually push my local build to the zot registry because there's no just recipe for it..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "What do you propose?"
      description: "How should it work? What would done look like?"
      placeholder: "Add a `just push-local` recipe that wraps `podman push` with the lab registry URL pre-filled."
    validations:
      required: true

  - type: textarea
    id: bluefin-fit
    attributes:
      label: "Why does this belong in Bluefin?"
      description: "How does this fit the project's direction? Link to a discussion, prior issue, or upstream if relevant."
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: "Affected area"
      description: "Pick the closest match — maintainers will refine."
      multiple: true
      options:
        - "area/buildstream"
        - "area/gnome"
        - "area/brew"
        - "area/just"
        - "area/iso"
        - "area/dx"
        - "area/services"
        - "area/flatpak"
        - "area/nvidia"
        - "area/hardware"
        - "area/testing"
        - "area/upstream"
        - "area/policy"
        - "other"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ### Acceptance criteria
        *Maintainers or wranglers fill this in when preparing the issue for the queue. Leave it blank when filing.*

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "Acceptance criteria"
      description: "Filled in by a maintainer after the issue is approved. Use real markdown checklist items (`- [ ] ...`). Agents use this as their spec."
      placeholder: |
        - [ ] `just push-local` recipe exists and is documented in `just --list`
        - [ ] Recipe pushes to `localhost:5000` by default with `REGISTRY` override
        - [ ] `just validate` passes after the change
      render: markdown
    validations:
      required: false

  - type: textarea
    id: affected-elements
    attributes:
      label: "Affected BST elements (if known)"
      description: "Which elements in elements/bluefin/ or elements/oci/ will change? Leave blank if unsure."
      placeholder: "Justfile only — no BST element changes"
    validations:
      required: false
