name: "Bug report"
description: "Something is broken. Let's fix it together."
title: "[Bug]: "
labels: ["kind/bug"]
type: "Bug"
body:
  - type: markdown
    attributes:
      value: |
        Found a bug? Let's squash it. 🐛
        Write this in your own words — no AI-generated text for the top sections.
        If you opt into **Raptor Current**, `actionadon` will open the structured path for you. Otherwise this stays a normal issue.

  - type: dropdown
    id: workflow-path
    attributes:
      label: "Workflow path"
      description: "Choose the lighter direct path, or opt into Raptor Current for structured issue flow → approval → wrangler queue → agent claim."
      options:
        - "Direct issue (skip workflow)"
        - "Raptor Current (structured + wrangler + agent queue)"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: "What happened?"
      description: "What did you see? What did you expect to see?"
      placeholder: |
        Running `just validate` locally checks a different graph than CI unless I remember the exact BST_FLAGS incantation.
        Expected: local validation should match CI by default.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: "Steps to reproduce"
      description: "Minimal steps to hit the bug. Include commands, environment, and any flags."
      placeholder: |
        1. `just validate`
        2. `just bst show --deps all oci/bluefin.bst`
        3. Compare local behavior with CI expectations
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      description: "Output of `bootc status` (if booted into dakota), OS, relevant tool versions."
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: "Affected area"
      multiple: true
      options:
        - "area/buildstream"
        - "area/gnome"
        - "area/brew"
        - "area/just"
        - "area/iso"
        - "area/dx"
        - "area/services"
        - "area/flatpak"
        - "area/nvidia"
        - "area/hardware"
        - "area/testing"
        - "area/upstream"
        - "area/policy"
        - "other"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ### Acceptance criteria
        *Maintainers fill this in when approving. Agents use this as their spec.*

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "Acceptance criteria"
      description: "Filled in by a maintainer. Use real markdown checklist items (`- [ ] ...`). Leave blank when filing."
      placeholder: |
        - [ ] `just validate` mirrors the CI validate job
        - [ ] `just bst show --deps all oci/bluefin.bst` uses the correct defaults without extra env vars
        - [ ] `just validate` passes after the fix
      render: markdown
    validations:
      required: false

  - type: textarea
    id: affected-elements
    attributes:
      label: "Affected BST elements or files (if known)"
      placeholder: "Justfile, elements/oci/bluefin.bst"
    validations:
      required: false
