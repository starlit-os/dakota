name: Weekly Testing Promotion

on:
  schedule:
    - cron: '0 6 * * 2' # Tuesday 06:00 UTC
  workflow_dispatch:

concurrency:
  group: weekly-testing-promotion
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  # ── Enforce a minimum 7-day floor between promotions ─────────────────────
  # Prevents churn when main receives only docs or trivial fixes.
  # workflow_dispatch bypasses the floor so maintainers can force a promotion
  # (e.g. after a hotfix or a failed previous run).
  check-promotion-floor:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      should_promote: ${{ steps.floor.outputs.should_promote }}
    steps:
      - name: Check days since last stable release
        id: floor
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual dispatch — bypassing promotion floor."
            echo "should_promote=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_RELEASE=$(gh release list \
            --repo "${{ github.repository }}" \
            --limit 1 \
            --json createdAt \
            --jq '.[0].createdAt // empty')

          if [[ -z "$LAST_RELEASE" ]]; then
            echo "No previous release found — first promotion, proceeding."
            echo "should_promote=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_TS=$(date -d "$LAST_RELEASE" +%s)
          NOW_TS=$(date +%s)
          DAYS_SINCE=$(( (NOW_TS - LAST_TS) / 86400 ))

          echo "Last stable release: $LAST_RELEASE (${DAYS_SINCE} days ago)"

          if [[ "$DAYS_SINCE" -lt 7 ]]; then
            echo "Floor not met (${DAYS_SINCE}/7 days) — skipping promotion this cycle."
            echo "should_promote=false" >> "$GITHUB_OUTPUT"
          else
            echo "Floor met (${DAYS_SINCE} days) — proceeding with promotion."
            echo "should_promote=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Resolve current :testing digests ─────────────────────────────────────
  # Pins the exact digests and verifies both variants share the same source SHA.
  resolve:
    needs: [check-promotion-floor]
    if: needs.check-promotion-floor.outputs.should_promote == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      source_sha: ${{ steps.verify.outputs.source_sha }}
      locked_sha: ${{ steps.lock-sha.outputs.locked_sha }}
      default_digest: ${{ steps.resolve-default.outputs.digest }}
      nvidia_digest: ${{ steps.resolve-nvidia.outputs.digest }}
      has_nvidia: ${{ steps.resolve-nvidia.outputs.found }}
    steps:
      - name: Login to GHCR (read-only)
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GH_TOKEN" | sudo podman login ghcr.io --username "$GH_ACTOR" --password-stdin

      - name: Resolve default :testing digest
        id: resolve-default
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ github.repository_owner }}/dakota:testing"
          sudo podman pull "$IMAGE"
          DIGEST=$(sudo podman inspect "$IMAGE" --format '{{.Digest}}')
          SHA=$(sudo podman inspect "$IMAGE" --format '{{index .Config.Labels "org.opencontainers.image.revision"}}')
          {
            echo "digest=$DIGEST"
            echo "sha=$SHA"
          } >> "$GITHUB_OUTPUT"
          echo "Default :testing → digest=$DIGEST, source_sha=$SHA"

      - name: Resolve NVIDIA :testing digest
        id: resolve-nvidia
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ github.repository_owner }}/dakota-nvidia:testing"
          if sudo podman pull "$IMAGE" 2>/dev/null; then
            DIGEST=$(sudo podman inspect "$IMAGE" --format '{{.Digest}}')
            SHA=$(sudo podman inspect "$IMAGE" --format '{{index .Config.Labels "org.opencontainers.image.revision"}}')
            {
              echo "digest=$DIGEST"
              echo "sha=$SHA"
              echo "found=true"
            } >> "$GITHUB_OUTPUT"
            echo "NVIDIA :testing → digest=$DIGEST, source_sha=$SHA"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "NVIDIA :testing not found — skipping NVIDIA promotion"
          fi

      - name: Verify variants share same source SHA
        id: verify
        env:
          DEFAULT_SHA: ${{ steps.resolve-default.outputs.sha }}
          NVIDIA_SHA: ${{ steps.resolve-nvidia.outputs.sha }}
          HAS_NVIDIA: ${{ steps.resolve-nvidia.outputs.found }}
        run: |
          set -euo pipefail
          if [ -z "$DEFAULT_SHA" ]; then
            echo "ERROR: default :testing has no org.opencontainers.image.revision label"
            exit 1
          fi

          if [ "$HAS_NVIDIA" = "true" ] && [ "$NVIDIA_SHA" != "$DEFAULT_SHA" ]; then
            echo "ERROR: NVIDIA source SHA ($NVIDIA_SHA) != default source SHA ($DEFAULT_SHA)"
            echo "Variants are out of sync — skipping promotion."
            echo "Default was built from $DEFAULT_SHA, NVIDIA from $NVIDIA_SHA."
            exit 1
          fi

          echo "source_sha=$DEFAULT_SHA" >> "$GITHUB_OUTPUT"
          echo "Source SHA: $DEFAULT_SHA (both variants match)"

      - name: Lock tested source SHA for TOCTOU guard
        id: lock-sha
        env:
          SOURCE_SHA: ${{ steps.verify.outputs.source_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CURRENT_SHA=$(gh api repos/${{ github.repository }}/git/ref/heads/main --jq '.object.sha')
          if [[ "${CURRENT_SHA}" != "${SOURCE_SHA}" ]]; then
            echo "::error::main has advanced since :testing was built."
            echo "  Built from: ${SOURCE_SHA}"
            echo "  Current:    ${CURRENT_SHA}"
            echo "Aborting promotion — re-run after the next testing build completes."
            exit 1
          fi
          echo "locked_sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"
          echo "Locked main SHA: ${SOURCE_SHA} (matches tested source)"

  # ── Check diff — skip if already promoted ────────────────────────────────
  check-diff:
    needs: [resolve]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      has_diff: ${{ steps.compare.outputs.has_diff }}
    steps:
      - name: Login to GHCR
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GH_TOKEN" | sudo podman login ghcr.io --username "$GH_ACTOR" --password-stdin

      - name: Compare :testing vs :latest digests
        id: compare
        env:
          TESTING_DIGEST: ${{ needs.resolve.outputs.default_digest }}
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ github.repository_owner }}/dakota:latest"
          if sudo podman pull "$IMAGE" 2>/dev/null; then
            LATEST_DIGEST=$(sudo podman inspect "$IMAGE" --format '{{.Digest}}')
            if [ "$LATEST_DIGEST" = "$TESTING_DIGEST" ]; then
              echo "No diff between :testing and :latest — nothing to promote"
              echo "has_diff=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "has_diff=true" >> "$GITHUB_OUTPUT"
          echo "Promotion needed: :testing differs from :latest"

  # ── Verify cosign signatures ─────────────────────────────────────────────
  verify-signatures:
    needs: [resolve, check-diff]
    if: needs.check-diff.outputs.has_diff == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Verify signatures for all promoted variants
        env:
          DEFAULT_DIGEST: ${{ needs.resolve.outputs.default_digest }}
          NVIDIA_DIGEST: ${{ needs.resolve.outputs.nvidia_digest }}
          HAS_NVIDIA: ${{ needs.resolve.outputs.has_nvidia }}
        run: |
          set -euo pipefail
          REGISTRY="ghcr.io/${{ github.repository_owner }}"
          FAILED=0

          verify_digest() {
            local image_ref="$1"
            echo "Verifying signature: ${image_ref}"
            if ! cosign verify \
              --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/publish\\.yml@refs/heads/(main|gh-readonly-queue/main/.+)$" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "${image_ref}" 2>/dev/null; then
              echo "::error::Signature verification FAILED for ${image_ref}"
              return 1
            fi
            echo "  ✅ Signature verified: ${image_ref}"
          }

          verify_digest "${REGISTRY}/dakota@${DEFAULT_DIGEST}" || FAILED=$((FAILED + 1))

          if [ "${HAS_NVIDIA}" = "true" ] && [ -n "${NVIDIA_DIGEST}" ]; then
            verify_digest "${REGISTRY}/dakota-nvidia@${NVIDIA_DIGEST}" || FAILED=$((FAILED + 1))
          fi

          if [ "${FAILED}" -gt 0 ]; then
            echo "::error::${FAILED} image(s) failed signature verification — aborting promotion"
            exit 1
          fi
          echo "✅ All signatures verified — proceeding with promotion"

  # ── Full e2e gate at weekly promotion time ────────────────────────────────
  e2e:
    needs: [resolve, check-diff]
    if: needs.check-diff.outputs.has_diff == 'true'
    permissions:
      packages: write
      contents: read
    uses: projectbluefin/testsuite/.github/workflows/e2e.yml@e1c00af3b85513b51f9441a02ce239e231c26e8c # main
    with:
      image: ghcr.io/${{ github.repository_owner }}/dakota@${{ needs.resolve.outputs.default_digest }}
      suites: smoke,common


  # ── Promote :testing → :latest + :stable ────────────────────────────────
  promote:
    environment: production
    needs: [resolve, check-diff, verify-signatures, e2e]
    if: >-
      needs.check-diff.outputs.has_diff == 'true' &&
      needs.verify-signatures.result == 'success' &&
      needs.e2e.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            image_suffix: ''
            digest_key: default_digest
            continue: false
          - variant: nvidia
            image_suffix: '-nvidia'
            digest_key: nvidia_digest
            continue: true
    continue-on-error: ${{ matrix.continue }}
    steps:
      - name: Skip if variant unavailable
        if: matrix.variant == 'nvidia' && needs.resolve.outputs.has_nvidia != 'true'
        run: |
          echo "NVIDIA variant not available — skipping"
          exit 0

      - name: Login to GHCR
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GH_TOKEN" | sudo podman login ghcr.io --username "$GH_ACTOR" --password-stdin

      - name: Verify source SHA has not advanced
        env:
          LOCKED_SHA: ${{ needs.resolve.outputs.locked_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CURRENT_SHA=$(gh api repos/${{ github.repository }}/git/ref/heads/main --jq '.object.sha')
          if [ "$CURRENT_SHA" != "$LOCKED_SHA" ]; then
            echo "ERROR: main advanced during promotion ($LOCKED_SHA → $CURRENT_SHA). Aborting."
            echo "Untested commits would reach latest/stable. Rerun next cycle."
            exit 1
          fi
          echo "✅ SHA unchanged: $CURRENT_SHA"

      - name: Promote to :latest and :stable
        env:
          SOURCE_SHA: ${{ needs.resolve.outputs.source_sha }}
          DEFAULT_DIGEST: ${{ needs.resolve.outputs.default_digest }}
          NVIDIA_DIGEST: ${{ needs.resolve.outputs.nvidia_digest }}
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ github.repository_owner }}/dakota${{ matrix.image_suffix }}"

          # Use resolved digest directly — prevents TOCTOU tag re-pull race
          if [ "${{ matrix.variant }}" = "nvidia" ]; then
            DIGEST="$NVIDIA_DIGEST"
          else
            DIGEST="$DEFAULT_DIGEST"
          fi

          sudo podman pull "${IMAGE}@${DIGEST}"

          # Tag and push as :latest
          sudo podman tag "${IMAGE}@${DIGEST}" "${IMAGE}:latest"
          PUSH_OK=false
          for attempt in 1 2 3; do
            sudo podman push --compression-format=zstd "${IMAGE}:latest" && { PUSH_OK=true; break; }
            echo "Push attempt ${attempt} failed for :latest, retrying in 5s..."
            [ "$attempt" -lt 3 ] && sleep 5
          done
          $PUSH_OK || { echo "ERROR: all push attempts failed for :latest"; exit 1; }

          # Tag and push as :stable
          sudo podman tag "${IMAGE}@${DIGEST}" "${IMAGE}:stable"
          PUSH_OK=false
          for attempt in 1 2 3; do
            sudo podman push --compression-format=zstd "${IMAGE}:stable" && { PUSH_OK=true; break; }
            echo "Push attempt ${attempt} failed for :stable, retrying in 5s..."
            [ "$attempt" -lt 3 ] && sleep 5
          done
          $PUSH_OK || { echo "ERROR: all push attempts failed for :stable"; exit 1; }

          echo "Promoted ${IMAGE}@${DIGEST} → :latest + :stable (source SHA: $SOURCE_SHA)"


  # ── Fast-forward branches ────────────────────────────────────────────────
  update-branches:
    needs: [resolve, promote]
    if: needs.promote.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Fast-forward latest and stable branches
        env:
          SOURCE_SHA: ${{ needs.resolve.outputs.source_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"

          for BRANCH in latest stable; do
            # Try fast-forward first; create if branch doesn't exist yet.
            if ! gh api "repos/${REPO}/git/refs/heads/${BRANCH}" \
                --method PATCH \
                --field sha="$SOURCE_SHA" \
                --field force=false 2>/dev/null; then
              gh api "repos/${REPO}/git/refs" \
                --method POST \
                --field ref="refs/heads/${BRANCH}" \
                --field sha="$SOURCE_SHA"
              echo "Created ${BRANCH} branch at ${SOURCE_SHA}"
            else
              echo "Fast-forwarded ${BRANCH} to ${SOURCE_SHA}"
            fi
          done

  # ── Generate release notes ────────────────────────────────────────────────
  generate-release:
    needs: [resolve, update-branches]
    if: needs.update-branches.result == 'success'
    permissions:
      contents: write
      actions: read
      packages: read
    uses: ./.github/workflows/release.yml
    with:
      source_sha:      ${{ needs.resolve.outputs.source_sha }}
      promoted_digest: ${{ needs.resolve.outputs.default_digest }}

  # ── Close stale failure issue on success ─────────────────────────────────
  close-failure-issue:
    needs: [update-branches]
    if: needs.update-branches.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Close open failure issue if present
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = 'ci: weekly promotion failure';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'area/testing,kind/bug',
              state: 'open',
            });
            const open = existing.data.find(i => i.title === title);
            if (open) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open.number,
                state: 'closed',
                state_reason: 'completed',
              });
              core.info(`Closed stale failure issue #${open.number}`);
            }

  # ── Open or update failure issue ─────────────────────────────────────────
  report-failure:
    needs: [resolve, check-diff, verify-signatures, e2e, promote, update-branches]
    if: always() && failure()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Open or update failure issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = 'ci: weekly promotion failure';
            const body = `## Weekly Promotion Failure\n\n**Run:** ${runUrl}\n\n_Automatically opened by weekly-testing-promotion.yml_`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'area/testing,kind/bug',
              state: 'open',
            });
            const dup = existing.data.find(i => i.title === title);
            if (dup) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: dup.number,
                body,
              });
              core.info(`Updated existing failure issue #${dup.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['area/testing', 'kind/bug', 'priority/p1'],
              });
            }
