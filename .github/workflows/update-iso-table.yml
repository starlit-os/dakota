name: Update ISO archive table

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [iso-published]

permissions: read-all

jobs:
  update-table:
    name: Rebuild ISO archive table from projectbluefin/dakota-iso
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main

      - name: Build ISO table
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'EOF'
          import subprocess, json, sys, re

          # Fetch last 100 runs from upstream dakota-iso
          result = subprocess.run(
              ['gh', 'run', 'list',
               '--repo', 'projectbluefin/dakota-iso',
               '--limit', '100',
               '--json', 'databaseId,conclusion,createdAt'],
              capture_output=True, text=True, check=True
          )
          runs = json.loads(result.stdout)
          good_runs = [r for r in runs if r['conclusion'] == 'success']

          seen_names = set()
          rows = []

          for run in good_runs:
              run_id = run['databaseId']
              art_result = subprocess.run(
                  ['gh', 'api',
                   f'repos/projectbluefin/dakota-iso/actions/runs/{run_id}/artifacts'],
                  capture_output=True, text=True, check=True
              )
              artifacts = json.loads(art_result.stdout).get('artifacts', [])
              iso = next(
                  (a for a in artifacts
                   if a['name'].endswith('.iso') and not a['name'].startswith('checksum')),
                  None
              )
              if not iso or iso['name'] in seen_names:
                  continue
              seen_names.add(iso['name'])

              name = iso['name']          # dakota-live-YYYYMMDD-<sha>.iso
              date = run['createdAt'][:10]
              base = f"https://projectbluefin.dev/{name}"
              cksum = f"https://projectbluefin.dev/{name}-CHECKSUM"
              rows.append(
                  f"| {date} | [{name}]({base}) | [checksum]({cksum}) |"
              )

          header = "| Date | ISO | Checksum |\n|------|-----|----------|"
          table = header + "\n" + "\n".join(rows)

          readme = open('README.md').read()
          new_readme = re.sub(
              r'<!-- iso-table-start -->.*?<!-- iso-table-end -->',
              f'<!-- iso-table-start -->\n{table}\n<!-- iso-table-end -->',
              readme,
              flags=re.DOTALL
          )

          if new_readme == readme:
              print("Table is already up to date.")
              sys.exit(0)

          open('README.md', 'w').write(new_readme)
          print(f"Updated table with {len(rows)} ISOs.")
          EOF

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md && echo "No changes." && exit 0
          git add README.md
          git commit -m "docs: update ISO archive table [skip ci]"
          git push
