name: Update Chunkah Filemap

# Regenerates files/filemap.json and files/fakecap-manifest.tsv — the
# component-to-file mapping chunkah uses for layer assignment.
#
# These files are pre-committed (Cargo.lock pattern) because gen-filemap.py
# requires `bst artifact list-contents`, which reads the *local* BST cache.
# CI uses remote execution on cache.projectbluefin.io so the local cache is
# empty during normal builds.  This workflow pulls all artifacts to the local
# cache, regenerates the mapping, and opens a PR when anything changed.
#
# GitHub Actions cache is keyed on element file hashes + gen-filemap.py so
# the expensive artifact pull is skipped when element structure is unchanged.
#
# Run frequency: monthly schedule (element structure changes slowly).
# Run manually (workflow_dispatch) after large element tree changes or
# junction updates.  Use force_regenerate to bypass the GHA cache.

on:
  schedule:
    # 1st of each month at 15:00 UTC — well after the daily nightly build.
    - cron: '0 15 1 * *'
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: 'Bypass GHA cache and force full regeneration'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  update-filemap:
    runs-on: ubuntu-24.04
    permissions:
      contents: write        # push branch for PR
      pull-requests: write   # gh pr create

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      # ── BuildStream config ────────────────────────────────────────────────
      # Mirrors build.yml config generation exactly — same mTLS block, same
      # tuning.  Without credentials, falls back to public cache (builds from
      # source — slower but functional; artifact pull will likely timeout).
      - name: Generate BuildStream CI config
        env:
          CASD_CLIENT_CERT: ${{ vars.CASD_CLIENT_CERT }}
          CASD_CLIENT_KEY: ${{ secrets.CASD_CLIENT_KEY }}
        run: |
          echo "$CASD_CLIENT_CERT" > client.crt
          echo "$CASD_CLIENT_KEY" > client.key
          cat > buildstream-ci.conf <<'BSTCONF'
          scheduler:
            on-error: continue
            fetchers: 32
            builders: 4
            network-retries: 3

          logging:
            message-format: '[%{wallclock}][%{elapsed}][%{key}][%{element}] %{action} %{message}'
            error-lines: 80

          cachedir: /root/.cache/buildstream
          logdir: /src/logs

          build:
            retry-failed: True

          BSTCONF

          if [[ -n "$CASD_CLIENT_CERT" ]] && [[ -n "$CASD_CLIENT_KEY" ]]; then
            cat >> buildstream-ci.conf <<'BSTCONFPUSH'
          artifacts:
            servers:
            - url: https://cache.projectbluefin.io:11002
              push: false
              connection-config:
                keepalive-time: 60
                retry-limit: 5
                retry-delay: 1000
                request-timeout: 180
              auth:
                client-key: /src/client.key
                client-cert: /src/client.crt

          source-caches:
            servers:
            - url: https://cache.projectbluefin.io:11002
              push: false
              connection-config:
                keepalive-time: 60
                retry-limit: 5
                retry-delay: 1000
                request-timeout: 180
              auth:
                client-key: /src/client.key
                client-cert: /src/client.crt

          cache:
            storage-service:
              url: https://cache.projectbluefin.io:11002
              connection-config:
                keepalive-time: 60
                retry-limit: 5
                retry-delay: 1000
                request-timeout: 180
              auth:
                client-key: /src/client.key
                client-cert: /src/client.crt

          remote-execution:
            execution-service:
              url: https://cache.projectbluefin.io:11002
              connection-config:
                keepalive-time: 60
                retry-limit: 5
                retry-delay: 1000
                request-timeout: 180
              auth:
                client-key: /src/client.key
                client-cert: /src/client.crt
            action-cache-service:
              url: https://cache.projectbluefin.io:11002
              connection-config:
                keepalive-time: 60
                retry-limit: 5
                retry-delay: 1000
                request-timeout: 180
              auth:
                client-key: /src/client.key
                client-cert: /src/client.crt
          BSTCONFPUSH
          fi

          echo "=== BuildStream CI config ==="
          cat buildstream-ci.conf

      # ── GHA cache key ─────────────────────────────────────────────────────
      # Key = hash of all .bst element files + project.conf + gen-filemap.py.
      # Changes to junction refs (tracked in .bst files) trigger a cache miss.
      # Not a perfect BST-key equivalent but avoids running BST just for key
      # computation, and is conservative enough for a monthly workflow.
      - name: Compute filemap cache key
        id: cache-key
        run: |
          ELEM_HASH=$(find elements -name '*.bst' -print0 | sort -z | \
            xargs -0 sha256sum | sha256sum | cut -d' ' -f1)
          CONF_HASH=$(sha256sum project.conf scripts/gen-filemap.py | \
            sha256sum | cut -d' ' -f1)
          echo "key=filemap-${ELEM_HASH}-${CONF_HASH}" >> "$GITHUB_OUTPUT"
          echo "Cache key: filemap-${ELEM_HASH}-${CONF_HASH}"

      # ── Restore GHA cache ─────────────────────────────────────────────────
      - name: Restore filemap from GHA cache
        id: cache-filemap
        if: inputs.force_regenerate != true
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            files/filemap.json
            files/fakecap-manifest.tsv
          key: ${{ steps.cache-key.outputs.key }}

      # ── Build + pull + generate (cache miss path) ─────────────────────────
      # Build is expected to be a fast cache hit via cache.projectbluefin.io.
      # The expensive step is artifact pull (~1064 artifacts, ~8 GB total) —
      # only runs on cache miss (element structure changed) or force_regenerate.
      - name: Build OCI layers element
        if: steps.cache-filemap.outputs.cache-hit != 'true'
        env:
          BST_FLAGS: --no-interactive --config /src/buildstream-ci.conf
        run: just bst build oci/layers/bluefin.bst
        timeout-minutes: 120

      - name: Pull all BST artifacts to local cache
        if: steps.cache-filemap.outputs.cache-hit != 'true'
        env:
          BST_FLAGS: --no-interactive --config /src/buildstream-ci.conf
        run: |
          # Pull all 1000+ element artifacts so bst artifact list-contents
          # (used by gen-filemap.py) can read them from the local cache.
          just bst artifact pull --deps all oci/layers/bluefin.bst
        timeout-minutes: 120

      - name: Generate filemap
        if: steps.cache-filemap.outputs.cache-hit != 'true'
        env:
          BST_FLAGS: --no-interactive --config /src/buildstream-ci.conf
        run: python3 scripts/gen-filemap.py

      - name: Save filemap to GHA cache
        if: steps.cache-filemap.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            files/filemap.json
            files/fakecap-manifest.tsv
          key: ${{ steps.cache-key.outputs.key }}

      # ── Open PR if anything changed ───────────────────────────────────────
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet files/filemap.json files/fakecap-manifest.tsv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Filemap is up to date — no PR needed."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Filemap changed:"
            git diff --stat files/filemap.json files/fakecap-manifest.tsv
          fi

      - name: Print filemap stats
        if: steps.changes.outputs.changed == 'true'
        run: |
          python3 -c "
          import json
          with open('files/filemap.json') as f:
              fm = json.load(f)
          total = sum(len(v['files']) for v in fm.values())
          by_interval = {}
          for data in fm.values():
              i = data.get('interval', 'unknown')
              by_interval[i] = by_interval.get(i, 0) + 1
          print(f'{len(fm)} components, {total} files')
          for k, v in sorted(by_interval.items()):
              print(f'  {k}: {v} elements')
          "

      - name: Create PR with updated filemap
        if: steps.changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/update-filemap-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add files/filemap.json files/fakecap-manifest.tsv
          git commit -m "chore: regenerate chunkah filemap and fakecap manifest"
          git push origin "$BRANCH" --force
          cat > /tmp/pr-body.md << 'PRBODY'
          Automated monthly refresh of the chunkah component filemap.

          Generated by scripts/gen-filemap.py from the current BST artifact tree.

          **Changed files:**
          - files/filemap.json: BST element to file path mapping (chunkah layer assignment)
          - files/fakecap-manifest.tsv: fakecap restore manifest (path to component to interval)

          **Why these files exist:** bst artifact list-contents requires the local BST cache.
          CI uses remote execution so the local cache is empty during normal builds.
          These are pre-committed like Cargo.lock and refreshed here when element structure changes.
          PRBODY
          gh pr create \
            --title "chore: regenerate chunkah filemap and fakecap manifest" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "$BRANCH" || echo "PR already exists for $BRANCH"
