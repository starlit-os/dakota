name: Publish Bluefin dakota

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build Bluefin dakota"]
    types: [completed]
    branches:
      - main
      - 'gh-readonly-queue/main/**'

env:
  IMAGE_NAME: dakota
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

permissions: read-all

concurrency:
  group: publish-main
  cancel-in-progress: false

jobs:
  # ── Resolve context ───────────────────────────────────────────────────────
  # Single source of truth for SHA and trigger event, shared by all downstream jobs.
  setup:
    runs-on: ubuntu-24.04
    outputs:
      sha: ${{ steps.context.outputs.sha }}
      event: ${{ steps.context.outputs.event }}
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event != 'pull_request' &&
       (github.event.workflow_run.head_branch == 'main' ||
        startsWith(github.event.workflow_run.head_branch, 'gh-readonly-queue/main/')))
    steps:
      - name: Resolve build SHA and trigger event
        id: context
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "event=${{ github.event.workflow_run.event }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "event=${{ github.event_name }}" >> "$GITHUB_OUTPUT"
          fi

  # ── Export, sign, attest ─────────────────────────────────────────────────
  # Pulls artifact from remote CAS, pushes :$sha, signs and attaches SBOM.
  # Runs for every trigger (merge_group, schedule, dispatch).
  # Does NOT push :latest — that is gated on e2e passing (see promote job).
  publish:
    needs: setup
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    # Variant matrix: default and NVIDIA publish in parallel from the shared
    # BST artifact cache. NVIDIA is `continue-on-error: true` so its failure
    # does not block default publication.
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            element: oci/bluefin.bst
            image_suffix: ''
            sbom_filename: dakota.spdx.json
            continue: false
          - variant: nvidia
            element: oci/bluefin-nvidia.bst
            image_suffix: '-nvidia'
            sbom_filename: dakota-nvidia.spdx.json
            continue: true
    continue-on-error: ${{ matrix.continue }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.setup.outputs.sha }}

      - name: Setup Just
        uses: taiki-e/install-action@873c7452cadb7c034694a1282227095d93fbdf92 # v2
        with:
          tool: just

      - name: Capture build timestamp
        id: timestamp
        run: echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Remove unwanted software
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9

      - name: Mount BTRFS for podman storage
        uses: ublue-os/container-storage-action@dc1f4c8f17b672069e921f001132f7cf98a423a6
        continue-on-error: true
        with:
          target-dir: /var/lib/containers
          mount-opts: compress-force=zstd:2
          loopback-free: '1'

      # Fetch-only BST config — pull artifact from remote CAS, no build/push
      - name: Generate BST fetch config
        env:
          CASD_CLIENT_CERT: ${{ vars.CASD_CLIENT_CERT }}
          CASD_CLIENT_KEY: ${{ secrets.CASD_CLIENT_KEY }}
        run: |
          mkdir -p logs
          echo "$CASD_CLIENT_CERT" > client.crt
          echo "$CASD_CLIENT_KEY" > client.key
          cat > buildstream-ci.conf <<'BSTCONF'
          scheduler:
            on-error: continue
            fetchers: 32
            builders: 4
            network-retries: 3

          logging:
            message-format: '[%{wallclock}][%{elapsed}][%{key}][%{element}] %{action} %{message}'
            error-lines: 80

          cachedir: /root/.cache/buildstream
          logdir: /src/logs

          BSTCONF

          if [[ -n "$CASD_CLIENT_CERT" ]] && [[ -n "$CASD_CLIENT_KEY" ]]; then
            cat >> buildstream-ci.conf <<'BSTCONFFETCH'
          artifacts:
            servers:
            - url: https://cache.projectbluefin.io:11002
              push: false
              connection-config:
                keepalive-time: 180
                retry-limit: 5
                retry-delay: 1000
                request-timeout: 180
              auth:
                client-key: /src/client.key
                client-cert: /src/client.crt

          source-caches:
            servers:
            - url: https://cache.projectbluefin.io:11002
              push: false
              connection-config:
                keepalive-time: 180
                retry-limit: 5
                retry-delay: 1000
                request-timeout: 180
              auth:
                client-key: /src/client.key
                client-cert: /src/client.crt
          BSTCONFFETCH
          fi

      - name: Export OCI image from BuildStream
        id: export
        env:
          BST_FLAGS: -o x86_64_v3 true --no-interactive --config /src/buildstream-ci.conf
          BUILD_IMAGE_NAME: ${{ env.IMAGE_NAME }}
          OCI_IMAGE_CREATED: ${{ steps.timestamp.outputs.created }}
          OCI_IMAGE_REVISION: ${{ needs.setup.outputs.sha }}
          OCI_IMAGE_VERSION: latest
        run: just export ${{ matrix.variant }}

      - name: Chunkify image layers
        env:
          BUILD_IMAGE_NAME: ${{ env.IMAGE_NAME }}${{ matrix.image_suffix }}
        run: just chunkify "${{ env.IMAGE_NAME }}${{ matrix.image_suffix }}:latest"

      - name: Validate with bootc container lint
        env:
          BUILD_IMAGE_NAME: ${{ env.IMAGE_NAME }}${{ matrix.image_suffix }}
        run: just lint

      - name: Generate SBOM
        env:
          BST_FLAGS: -o x86_64_v3 true --no-interactive --config /src/buildstream-ci.conf
        run: just sbom ${{ matrix.variant }}

      - name: Upload SBOM artifact for release workflow
        if: matrix.variant == 'default'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ needs.setup.outputs.sha }}
          path: dakota.spdx.json
          retention-days: 30

      - name: Login to GHCR
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GH_TOKEN" | sudo podman login ghcr.io --username "$GH_ACTOR" --password-stdin
          mkdir -p ~/.docker
          echo "$GH_TOKEN" | podman login ghcr.io --username "$GH_ACTOR" --password-stdin \
            --compat-auth-file ~/.docker/config.json

      - name: Push :${{ needs.setup.outputs.sha }} to GHCR
        id: push
        env:
          BUILD_SHA: ${{ needs.setup.outputs.sha }}
        run: |
          LOCAL_IMAGE="${{ env.IMAGE_NAME }}${{ matrix.image_suffix }}"
          IMAGE="${{ env.IMAGE_REGISTRY }}/${LOCAL_IMAGE}"

          sudo podman tag "localhost/${LOCAL_IMAGE}:latest" "${IMAGE}:${BUILD_SHA}"

          PUSH_OK=false
          for attempt in 1 2 3; do
            sudo podman push --compression-format=zstd \
              --digestfile /tmp/digest.txt \
              "${IMAGE}:${BUILD_SHA}" && { PUSH_OK=true; break; }
            echo "Push attempt ${attempt} failed for :${BUILD_SHA}, retrying in 5s..."
            [ "$attempt" -lt 3 ] && sleep 5
          done
          $PUSH_OK || { echo "ERROR: all push attempts failed for :${BUILD_SHA}"; exit 1; }

          echo "digest=$(cat /tmp/digest.txt)" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6

      - name: Install oras
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0

      - name: Sign image
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign -y \
            "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.image_suffix }}@${DIGEST}"

      - name: Attach SBOM
        id: sbom-attach
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -o pipefail
          SBOM_DIGEST=$(oras attach \
            --artifact-type application/vnd.spdx+json \
            --format json \
            "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.image_suffix }}@${DIGEST}" \
            ${{ matrix.sbom_filename }}:application/vnd.spdx+json \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['digest'])")
          if [[ -z "$SBOM_DIGEST" || "$SBOM_DIGEST" == "None" ]]; then
            echo "ERROR: Failed to capture SBOM digest from oras attach"
            exit 1
          fi
          echo "sbom_digest=${SBOM_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Sign SBOM
        env:
          SBOM_DIGEST: ${{ steps.sbom-attach.outputs.sbom_digest }}
        run: |
          cosign sign -y \
            "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.image_suffix }}@${SBOM_DIGEST}"

      - name: SLSA attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.image_suffix }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # ── E2E gate ─────────────────────────────────────────────────────────────
  # Smoke-tests the freshly pushed :$sha before promoting to :testing.
  # Only runs on schedule and workflow_dispatch — merge_group does not
  # produce :testing so there is nothing to gate.
  e2e-gate:
    needs: [setup, publish]
    if: >-
      needs.publish.result == 'success' &&
      (needs.setup.outputs.event == 'schedule' ||
       needs.setup.outputs.event == 'workflow_dispatch')
    uses: projectbluefin/testsuite/.github/workflows/e2e.yml@main
    with:
      image: ghcr.io/projectbluefin/dakota:${{ needs.setup.outputs.sha }}
      suites: smoke
    secrets: inherit

  # ── Promote :testing ──────────────────────────────────────────────────────
  # Re-tags :$sha as :testing once e2e passes.
  # Weekly promotion (weekly-testing-promotion.yml) later promotes :testing
  # to :latest and :stable via digest-pinned re-tagging.
  # NVIDIA is continue-on-error so a failing NVIDIA promote does not
  # prevent the default :testing from landing.
  promote:
    needs: [setup, publish, e2e-gate]
    if: needs.e2e-gate.result == 'success'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_suffix: ''
            continue: false
          - image_suffix: '-nvidia'
            continue: true
    continue-on-error: ${{ matrix.continue }}
    permissions:
      contents: write
      packages: write
    steps:
      - name: Login to GHCR
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GH_TOKEN" | sudo podman login ghcr.io --username "$GH_ACTOR" --password-stdin

      - name: Promote :${{ needs.setup.outputs.sha }} to :testing
        env:
          BUILD_SHA: ${{ needs.setup.outputs.sha }}
        run: |
          IMAGE="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.image_suffix }}"
          sudo podman pull "${IMAGE}:${BUILD_SHA}"
          sudo podman tag "${IMAGE}:${BUILD_SHA}" "${IMAGE}:testing"
          PUSH_OK=false
          for attempt in 1 2 3; do
            sudo podman push --compression-format=zstd "${IMAGE}:testing" && { PUSH_OK=true; break; }
            echo "Push attempt ${attempt} failed for :testing, retrying in 5s..."
            [ "$attempt" -lt 3 ] && sleep 5
          done
          $PUSH_OK || { echo "ERROR: all push attempts failed for :testing"; exit 1; }

      - name: Fast-forward testing branch
        if: matrix.image_suffix == ''
        env:
          BUILD_SHA: ${{ needs.setup.outputs.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fast-forward the testing branch to the promoted SHA.
          # Creates the branch if it doesn't exist yet (first run after setup).
          gh api repos/${{ github.repository }}/git/refs/heads/testing \
            --method PATCH \
            --field sha="$BUILD_SHA" \
            --field force=false 2>/dev/null || \
          gh api repos/${{ github.repository }}/git/refs \
            --method POST \
            --field ref="refs/heads/testing" \
            --field sha="$BUILD_SHA"
