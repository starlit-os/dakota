name: actionadon

# actionadon вЂ” lifecycle bot for Dakota issues.
# Pipeline: filed в†’ approved в†’ queued в†’ claimed в†’ done
# Commands: /claim  /unclaim  /approve (/lgtm alias)
#
# The pipeline widget lives in the issue body, updated in place on every
# transition. Zero comments for pipeline state вЂ” one edit per stage.

on:
  issues:
    types: [opened, labeled, closed]
  issue_comment:
    types: [created]
  schedule:
    - cron: '0 9 * * *'

permissions:
  issues: write
  contents: read

env:
  DONATION_WORKFLOW_MARKER: "Workflow: Agent Donation"

jobs:
  ensure-labels:
    if: >-
      github.event_name == 'issues' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request == null &&
       (startsWith(github.event.comment.body, '/claim') ||
        startsWith(github.event.comment.body, '/unclaim') ||
        startsWith(github.event.comment.body, '/approve') ||
        startsWith(github.event.comment.body, '/lgtm')))
    runs-on: ubuntu-24.04
    steps:
      - name: Create lifecycle labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          label() {
            gh label create "$1" --color "$2" --description "$3" --repo "$REPO" 2>/dev/null \
              || gh label edit "$1" --color "$2" --description "$3" --repo "$REPO" 2>/dev/null \
              || true
          }
          label "needs-triage"           "d4c5f9" "Needs human review вЂ” set kind, priority, and area."
          label "status/discussing"      "7c83fd" "Under discussion вЂ” not yet approved for the build queue."
          label "status/approved"        "2ea44f" "Approved вЂ” ready for contributors."
          label "queue/agent-ready"      "a467dc" "Has a spec, ready to claim вЂ” comment /claim."
          label "queue/claimed"          "e8b86d" "In active work вЂ” comment /unclaim to return."
          label "lgtm"                   "0e8a16" "Maintainer approved вЂ” ready to merge."
          label "agent/blocked"          "e74c3c" "Blocked вЂ” needs human input before work can continue."
          label "needs-human/agent-oops" "f795fe" "Agent error вЂ” do not touch; humans only."
          label "kind:agent-donation"    "1b7f83" "Donate agent time for a repo, issue, or PR review/report request."
          label "flow/project-report"    "0e8a16" "Agent flow: produce a sourced project report."
          label "flow/issue-review"      "5319e7" "Agent flow: review a linked issue and produce a sourced report."
          label "flow/pr-review"         "fbca04" "Agent flow: review a linked pull request and produce a sourced report."
          label "hold"                   "8b949e" "Do not touch; intentionally held by humans."
          label "do-not-merge"           "b60205" "Do not merge or automate this item."

  on-issue-opened:
    if: github.event_name == 'issues' && github.event.action == 'opened'
    needs: ensure-labels
    runs-on: ubuntu-24.04
    steps:
      - name: Detect donation flow
        id: donation
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          WORKFLOW="standard"
          FLOW_LABEL=""
          if printf '%s\n' "$ISSUE_BODY" | grep -Fq "$DONATION_WORKFLOW_MARKER"; then
            WORKFLOW="agent_donation"
            FLOW_LABEL="flow/project-report"
            if printf '%s\n' "$ISSUE_BODY" | grep -Eq 'https://[^[:space:])>]+/pull/[0-9]+'; then
              FLOW_LABEL="flow/pr-review"
            elif printf '%s\n' "$ISSUE_BODY" | grep -Eq 'https://[^[:space:])>]+/issues/[0-9]+'; then
              FLOW_LABEL="flow/issue-review"
            fi
          fi
          echo "workflow=$WORKFLOW" >> "$GITHUB_OUTPUT"
          echo "flow_label=$FLOW_LABEL" >> "$GITHUB_OUTPUT"

      - name: Fast-track donated agent work
        if: steps.donation.outputs.workflow == 'agent_donation'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          FLOW_LABEL: ${{ steps.donation.outputs.flow_label }}
        run: |
          gh issue edit "$ISSUE_URL" \
            --add-label "status/approved" \
            --add-label "queue/agent-ready" \
            --add-label "kind:agent-donation" \
            --add-label "$FLOW_LABEL"
          # stage 2 = queued (auto-approved on donation)
          DATA=$(gh issue view "$ISSUE_URL" --json labels,assignees,body,comments)
          FULL_BODY=$(printf '%s' "$DATA" | jq -r '.body // ""')
          CLEAN=$(printf '%s\n' "$FULL_BODY" | awk 'BEGIN{s=0} /^<!-- actionadon-pipeline -->/{s=1} s && /^---$/{s=0; next} !s{print}')
          AREA=$(printf '%s' "$DATA" | jq -r '[.labels[].name | select(startswith("area/")) | ltrimstr("area/")] | first // "вЂ”"')
          PRIORITY=$(printf '%s' "$DATA" | jq -r '[.labels[].name | select(startswith("priority/")) | ltrimstr("priority/")] | first // "вЂ”"')
          REPORT="missing"; printf '%s\n' "$CLEAN" | grep -q 'gist.github.com' && REPORT="attached"
          CONFIRMS=$(printf '%s' "$DATA" | jq -r '[.comments[].body | select(. != null) | select(test("ujust confirm";"i"))] | length')
          WIDGET=$(printf '<!-- actionadon-pipeline -->\n```\nDAKOTA  В·  issue pipeline\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\n  вњ“  filed      report received\n  вњ“  approved   cleared for the build queue\n  в–¶  queued     open for contributors\n  В·  claimed    вЂ”\n  В·  done       вЂ”\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\n  report:       %-10s  В·  confirms: %s\n  area:         %-10s  В·  priority: %s\n  next action:  comment /claim to take this\n```\n\n---\n\n' "$REPORT" "$CONFIRMS" "$AREA" "$PRIORITY")
          printf '%s%s' "$WIDGET" "$CLEAN" > /tmp/new-body.md
          gh issue edit "$ISSUE_URL" --body-file /tmp/new-body.md

      - name: Filed вЂ” add triage label and widget
        if: steps.donation.outputs.workflow != 'agent_donation'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          gh issue edit "$ISSUE_URL" --add-label "needs-triage"
          DATA=$(gh issue view "$ISSUE_URL" --json labels,assignees,body,comments)
          FULL_BODY=$(printf '%s' "$DATA" | jq -r '.body // ""')
          # On open the body has no widget yet вЂ” use as-is
          CLEAN="$FULL_BODY"
          AREA=$(printf '%s' "$DATA" | jq -r '[.labels[].name | select(startswith("area/")) | ltrimstr("area/")] | first // "вЂ”"')
          PRIORITY=$(printf '%s' "$DATA" | jq -r '[.labels[].name | select(startswith("priority/")) | ltrimstr("priority/")] | first // "вЂ”"')
          REPORT="missing"; printf '%s\n' "$CLEAN" | grep -q 'gist.github.com' && REPORT="attached"
          CONFIRMS=$(printf '%s' "$DATA" | jq -r '[.comments[].body | select(. != null) | select(test("ujust confirm";"i"))] | length')
          WIDGET=$(printf '<!-- actionadon-pipeline -->\n```\nDAKOTA  В·  issue pipeline\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\n  в–¶  filed      report received\n  В·  approved   вЂ”\n  В·  queued     вЂ”\n  В·  claimed    вЂ”\n  В·  done       вЂ”\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\n  report:       %-10s  В·  confirms: %s\n  area:         %-10s  В·  priority: %s\n  next action:  same bug? ujust confirm %s\n```\n\n---\n\n' "$REPORT" "$CONFIRMS" "$AREA" "$PRIORITY" "$ISSUE_NUMBER")
          printf '%s%s' "$WIDGET" "$CLEAN" > /tmp/new-body.md
          gh issue edit "$ISSUE_URL" --body-file /tmp/new-body.md

  on-labeled:
    if: github.event_name == 'issues' && github.event.action == 'labeled'
    needs: ensure-labels
    runs-on: ubuntu-24.04
    steps:
      - name: Approved вЂ” auto-queue and update widget
        if: github.event.label.name == 'status/approved'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          gh issue edit "$ISSUE_URL" --add-label "queue/agent-ready"
          DATA=$(gh issue view "$ISSUE_URL" --json labels,assignees,body,comments)
          FULL_BODY=$(printf '%s' "$DATA" | jq -r '.body // ""')
          CLEAN=$(printf '%s\n' "$FULL_BODY" | awk 'BEGIN{s=0} /^<!-- actionadon-pipeline -->/{s=1} s && /^---$/{s=0; next} !s{print}')
          AREA=$(printf '%s' "$DATA" | jq -r '[.labels[].name | select(startswith("area/")) | ltrimstr("area/")] | first // "вЂ”"')
          PRIORITY=$(printf '%s' "$DATA" | jq -r '[.labels[].name | select(startswith("priority/")) | ltrimstr("priority/")] | first // "вЂ”"')
          REPORT="missing"; printf '%s\n' "$CLEAN" | grep -q 'gist.github.com' && REPORT="attached"
          CONFIRMS=$(printf '%s' "$DATA" | jq -r '[.comments[].body | select(. != null) | select(test("ujust confirm";"i"))] | length')
          WIDGET=$(printf '<!-- actionadon-pipeline -->\n```\nDAKOTA  В·  issue pipeline\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\n  вњ“  filed      report received\n  вњ“  approved   cleared for the build queue\n  в–¶  queued     open for contributors\n  В·  claimed    вЂ”\n  В·  done       вЂ”\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\n  report:       %-10s  В·  confirms: %s\n  area:         %-10s  В·  priority: %s\n  next action:  comment /claim to take this\n```\n\n---\n\n' "$REPORT" "$CONFIRMS" "$AREA" "$PRIORITY")
          printf '%s%s' "$WIDGET" "$CLEAN" > /tmp/new-body.md
          gh issue edit "$ISSUE_URL" --body-file /tmp/new-body.md

      - name: Claimed вЂ” update widget
        if: github.event.label.name == 'queue/claimed'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          DATA=$(gh issue view "$ISSUE_URL" --json labels,assignees,body,comments)
          FULL_BODY=$(printf '%s' "$DATA" | jq -r '.body // ""')
          CLEAN=$(printf '%s\n' "$FULL_BODY" | awk 'BEGIN{s=0} /^<!-- actionadon-pipeline -->/{s=1} s && /^---$/{s=0; next} !s{print}')
          AREA=$(printf '%s' "$DATA" | jq -r '[.labels[].name | select(startswith("area/")) | ltrimstr("area/")] | first // "вЂ”"')
          PRIORITY=$(printf '%s' "$DATA" | jq -r '[.labels[].name | select(startswith("priority/")) | ltrimstr("priority/")] | first // "вЂ”"')
          REPORT="missing"; printf '%s\n' "$CLEAN" | grep -q 'gist.github.com' && REPORT="attached"
          CONFIRMS=$(printf '%s' "$DATA" | jq -r '[.comments[].body | select(. != null) | select(test("ujust confirm";"i"))] | length')
          ASSIGNEE=$(printf '%s' "$DATA" | jq -r '.assignees[0].login // "вЂ”"')
          WIDGET=$(printf '<!-- actionadon-pipeline -->\n```\nDAKOTA  В·  issue pipeline\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\n  вњ“  filed      report received\n  вњ“  approved   cleared for the build queue\n  вњ“  queued     вЂ”\n  в–¶  claimed    @%s\n  В·  done       вЂ”\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\n  report:       %-10s  В·  confirms: %s\n  area:         %-10s  В·  priority: %s\n  next action:  /unclaim to return to queue if stuck\n```\n\n---\n\n' "$ASSIGNEE" "$REPORT" "$CONFIRMS" "$AREA" "$PRIORITY")
          printf '%s%s' "$WIDGET" "$CLEAN" > /tmp/new-body.md
          gh issue edit "$ISSUE_URL" --body-file /tmp/new-body.md

  on-issue-closed:
    if: github.event_name == 'issues' && github.event.action == 'closed'
    runs-on: ubuntu-24.04
    steps:
      - name: Done вЂ” update widget
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          DATA=$(gh issue view "$ISSUE_URL" --json labels,assignees,body,comments)
          FULL_BODY=$(printf '%s' "$DATA" | jq -r '.body // ""')
          CLEAN=$(printf '%s\n' "$FULL_BODY" | awk 'BEGIN{s=0} /^<!-- actionadon-pipeline -->/{s=1} s && /^---$/{s=0; next} !s{print}')
          AREA=$(printf '%s' "$DATA" | jq -r '[.labels[].name | select(startswith("area/")) | ltrimstr("area/")] | first // "вЂ”"')
          PRIORITY=$(printf '%s' "$DATA" | jq -r '[.labels[].name | select(startswith("priority/")) | ltrimstr("priority/")] | first // "вЂ”"')
          REPORT="missing"; printf '%s\n' "$CLEAN" | grep -q 'gist.github.com' && REPORT="attached"
          VERIFIED=$(printf '%s' "$DATA" | jq -r '[.comments[].body | select(. != null) | select(test("ujust verify";"i"))] | length')
          WIDGET=$(printf '<!-- actionadon-pipeline -->\n```\nDAKOTA  В·  issue pipeline\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\n  вњ“  filed      report received\n  вњ“  approved   cleared for the build queue\n  вњ“  queued     вЂ”\n  вњ“  claimed    вЂ”\n  в–¶  done       fix shipped\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\n  report:       %-10s  В·  verified: %s/3\n  area:         %-10s  В·  priority: %s\n  next action:  ujust verify %s вЂ” three verifies closes the case\n```\n\n---\n\n' "$REPORT" "$VERIFIED" "$AREA" "$PRIORITY" "$ISSUE_NUMBER")
          printf '%s%s' "$WIDGET" "$CLEAN" > /tmp/new-body.md
          gh issue edit "$ISSUE_URL" --body-file /tmp/new-body.md

  claim-handler:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request == null &&
      (startsWith(github.event.comment.body, '/claim') ||
       startsWith(github.event.comment.body, '/unclaim') ||
       startsWith(github.event.comment.body, '/approve') ||
       startsWith(github.event.comment.body, '/lgtm'))
    needs: ensure-labels
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve commenter permission
        id: permission
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENTER: ${{ github.event.comment.user.login }}
          REPO: ${{ github.repository }}
        run: |
          PERMISSION=$(gh api "repos/${REPO}/collaborators/${COMMENTER}/permission" \
            --jq '.permission' 2>/dev/null || echo "none")
          HAS_WRITE=false
          case "$PERMISSION" in admin|maintain|write) HAS_WRITE=true ;; esac
          echo "has_write=$HAS_WRITE" >> "$GITHUB_OUTPUT"

      - name: Handle /claim
        if: startsWith(github.event.comment.body, '/claim')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          COMMENTER: ${{ github.event.comment.user.login }}
        run: |
          LABELS=$(gh issue view "$ISSUE_URL" --json labels --jq '[.labels[].name] | join(",")')
          if echo "$LABELS" | grep -q "queue/claimed"; then
            ASSIGNEE=$(gh issue view "$ISSUE_URL" --json assignees --jq '.assignees[0].login // "someone"')
            gh issue comment "$ISSUE_URL" --body "Already claimed by @${ASSIGNEE}. The assignee or a maintainer can \`/unclaim\` to return it."
            exit 0
          fi
          if ! echo "$LABELS" | grep -q "queue/agent-ready"; then
            gh issue comment "$ISSUE_URL" --body "This issue is not in the queue yet вЂ” it needs \`queue/agent-ready\` before it can be claimed."
            exit 0
          fi
          gh issue edit "$ISSUE_URL" --add-label "queue/claimed" --add-assignee "$COMMENTER"
          DATA=$(gh issue view "$ISSUE_URL" --json labels,assignees,body,comments)
          FULL_BODY=$(printf '%s' "$DATA" | jq -r '.body // ""')
          CLEAN=$(printf '%s\n' "$FULL_BODY" | awk 'BEGIN{s=0} /^<!-- actionadon-pipeline -->/{s=1} s && /^---$/{s=0; next} !s{print}')
          AREA=$(printf '%s' "$DATA" | jq -r '[.labels[].name | select(startswith("area/")) | ltrimstr("area/")] | first // "вЂ”"')
          PRIORITY=$(printf '%s' "$DATA" | jq -r '[.labels[].name | select(startswith("priority/")) | ltrimstr("priority/")] | first // "вЂ”"')
          REPORT="missing"; printf '%s\n' "$CLEAN" | grep -q 'gist.github.com' && REPORT="attached"
          CONFIRMS=$(printf '%s' "$DATA" | jq -r '[.comments[].body | select(. != null) | select(test("ujust confirm";"i"))] | length')
          WIDGET=$(printf '<!-- actionadon-pipeline -->\n```\nDAKOTA  В·  issue pipeline\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\n  вњ“  filed      report received\n  вњ“  approved   cleared for the build queue\n  вњ“  queued     вЂ”\n  в–¶  claimed    @%s\n  В·  done       вЂ”\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\n  report:       %-10s  В·  confirms: %s\n  area:         %-10s  В·  priority: %s\n  next action:  /unclaim to return to queue if stuck\n```\n\n---\n\n' "$COMMENTER" "$REPORT" "$CONFIRMS" "$AREA" "$PRIORITY")
          printf '%s%s' "$WIDGET" "$CLEAN" > /tmp/new-body.md
          gh issue edit "$ISSUE_URL" --body-file /tmp/new-body.md

      - name: Handle /unclaim
        if: startsWith(github.event.comment.body, '/unclaim')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          COMMENTER: ${{ github.event.comment.user.login }}
          HAS_WRITE: ${{ steps.permission.outputs.has_write }}
        run: |
          ASSIGNEE=$(gh issue view "$ISSUE_URL" --json assignees --jq '.assignees[0].login // ""')
          if [ "$COMMENTER" != "$ASSIGNEE" ] && [ "$HAS_WRITE" != "true" ]; then
            gh issue comment "$ISSUE_URL" --body "Only @${ASSIGNEE} or a maintainer can unclaim this issue."
            exit 0
          fi
          gh issue edit "$ISSUE_URL" --remove-label "queue/claimed"
          [ -n "$ASSIGNEE" ] && gh issue edit "$ISSUE_URL" --remove-assignee "$ASSIGNEE"
          DATA=$(gh issue view "$ISSUE_URL" --json labels,assignees,body,comments)
          FULL_BODY=$(printf '%s' "$DATA" | jq -r '.body // ""')
          CLEAN=$(printf '%s\n' "$FULL_BODY" | awk 'BEGIN{s=0} /^<!-- actionadon-pipeline -->/{s=1} s && /^---$/{s=0; next} !s{print}')
          AREA=$(printf '%s' "$DATA" | jq -r '[.labels[].name | select(startswith("area/")) | ltrimstr("area/")] | first // "вЂ”"')
          PRIORITY=$(printf '%s' "$DATA" | jq -r '[.labels[].name | select(startswith("priority/")) | ltrimstr("priority/")] | first // "вЂ”"')
          REPORT="missing"; printf '%s\n' "$CLEAN" | grep -q 'gist.github.com' && REPORT="attached"
          CONFIRMS=$(printf '%s' "$DATA" | jq -r '[.comments[].body | select(. != null) | select(test("ujust confirm";"i"))] | length')
          WIDGET=$(printf '<!-- actionadon-pipeline -->\n```\nDAKOTA  В·  issue pipeline\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\n  вњ“  filed      report received\n  вњ“  approved   cleared for the build queue\n  в–¶  queued     open for contributors\n  В·  claimed    вЂ”\n  В·  done       вЂ”\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\n  report:       %-10s  В·  confirms: %s\n  area:         %-10s  В·  priority: %s\n  next action:  comment /claim to take this\n```\n\n---\n\n' "$REPORT" "$CONFIRMS" "$AREA" "$PRIORITY")
          printf '%s%s' "$WIDGET" "$CLEAN" > /tmp/new-body.md
          gh issue edit "$ISSUE_URL" --body-file /tmp/new-body.md

      - name: Handle /approve and /lgtm
        if: >-
          startsWith(github.event.comment.body, '/approve') ||
          startsWith(github.event.comment.body, '/lgtm')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          COMMENTER: ${{ github.event.comment.user.login }}
          HAS_WRITE: ${{ steps.permission.outputs.has_write }}
        run: |
          if [ "$HAS_WRITE" != "true" ]; then
            gh issue comment "$ISSUE_URL" --body "Only maintainers with write access can \`/approve\`."
            exit 0
          fi
          gh issue edit "$ISSUE_URL" --add-label "lgtm"
          gh issue comment "$ISSUE_URL" --body "lgtm вЂ” @${COMMENTER} approved."

  stale-claim-sweep:
    if: github.event_name == 'schedule'
    needs: ensure-labels
    runs-on: ubuntu-24.04
    steps:
      - name: Unclaim stale issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          CUTOFF=$(date -u -d '7 days ago' '+%Y-%m-%dT%H:%M:%SZ')
          gh issue list --repo "$REPO" \
            --label "queue/claimed" \
            --json number,url,updatedAt,assignees \
            --jq ".[] | select(.updatedAt < \"${CUTOFF}\") | .number" \
          | while read -r NUMBER; do
              ISSUE_URL="https://github.com/${REPO}/issues/${NUMBER}"
              ASSIGNEE=$(gh issue view "$NUMBER" --repo "$REPO" --json assignees --jq '.assignees[0].login // ""')
              gh issue edit "$NUMBER" --repo "$REPO" --remove-label "queue/claimed"
              [ -n "$ASSIGNEE" ] && gh issue edit "$NUMBER" --repo "$REPO" --remove-assignee "$ASSIGNEE"
              DATA=$(gh issue view "$NUMBER" --repo "$REPO" --json labels,assignees,body,comments)
              FULL_BODY=$(printf '%s' "$DATA" | jq -r '.body // ""')
              CLEAN=$(printf '%s\n' "$FULL_BODY" | awk 'BEGIN{s=0} /^<!-- actionadon-pipeline -->/{s=1} s && /^---$/{s=0; next} !s{print}')
              AREA=$(printf '%s' "$DATA" | jq -r '[.labels[].name | select(startswith("area/")) | ltrimstr("area/")] | first // "вЂ”"')
              PRIORITY=$(printf '%s' "$DATA" | jq -r '[.labels[].name | select(startswith("priority/")) | ltrimstr("priority/")] | first // "вЂ”"')
              REPORT="missing"; printf '%s\n' "$CLEAN" | grep -q 'gist.github.com' && REPORT="attached"
              CONFIRMS=$(printf '%s' "$DATA" | jq -r '[.comments[].body | select(. != null) | select(test("ujust confirm";"i"))] | length')
              WIDGET=$(printf '<!-- actionadon-pipeline -->\n```\nDAKOTA  В·  issue pipeline\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\n  вњ“  filed      report received\n  вњ“  approved   cleared for the build queue\n  в–¶  queued     open for contributors\n  В·  claimed    вЂ”\n  В·  done       вЂ”\nв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ\n  report:       %-10s  В·  confirms: %s\n  area:         %-10s  В·  priority: %s\n  next action:  comment /claim to take this\n```\n\n---\n\n' "$REPORT" "$CONFIRMS" "$AREA" "$PRIORITY")
              printf '%s%s' "$WIDGET" "$CLEAN" > /tmp/new-body.md
              gh issue edit "$NUMBER" --repo "$REPO" --body-file /tmp/new-body.md
              [ -n "$ASSIGNEE" ] && gh issue comment "$ISSUE_URL" \
                --body "Stale claim released after 7 days. @${ASSIGNEE} вЂ” comment \`/claim\` to resume."
            done
