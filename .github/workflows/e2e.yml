# E2E Tests — GNOME 50
#
# Runs the projectbluefin/testsuite smoke suite inside a KVM-accelerated QEMU VM
# on a standard GitHub Actions runner.  No self-hosted runners, no ghost, no Argo.
#
# Pipeline:
#   1. Checkout testsuite (latest main — always fresh, sparse)
#   2. Install OCI image to raw disk via bootc + configure for testing
#   3. Boot the VM with QEMU + KVM + direct kernel boot (no UEFI/OVMF)
#   4. Wait for SSH + live Wayland session (GDM autologin pre-baked)
#   5. Install test deps inside the VM
#   6. Run behave via qecore-headless
#   7. Publish results as job summary + artifact

name: E2E Tests — GNOME 50

on:
  pull_request:
    branches: [main]
    # Only run when image content changes. CI fixes, docs, and workflow
    # edits don't need a full VM boot cycle.
    paths:
      - 'elements/**'
      - 'files/**'
      - 'patches/**'
      - 'Justfile'
      - 'project.conf'
  workflow_dispatch:
    inputs:
      image:
        description: "OCI image to test (default: dakota:latest)"
        required: false
        default: "ghcr.io/projectbluefin/dakota:latest"
      suites:
        description: "Comma-separated suites: smoke,developer,dx,lifecycle,security,software"
        required: false
        default: "smoke"

permissions: read-all

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

# ── Suite matrix ──────────────────────────────────────────────────────────────
# PRs always run 'smoke'. workflow_dispatch can request multiple suites as a
# comma-separated list (e.g. "smoke,developer") and each runs in parallel.
jobs:
  matrix:
    name: Resolve test matrix
    runs-on: ubuntu-latest
    outputs:
      suites: ${{ steps.resolve.outputs.suites }}
      image:  ${{ steps.resolve.outputs.image }}
    steps:
      - name: Resolve suites and image
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RAW="${{ inputs.suites || 'smoke' }}"
            IMAGE="${{ inputs.image || 'ghcr.io/projectbluefin/dakota:latest' }}"
          else
            RAW="smoke"
            IMAGE="ghcr.io/projectbluefin/dakota:latest"
          fi
          # Convert comma-separated list to JSON array for matrix
          JSON=$(python3 -c "import json,sys; parts=[s.strip() for s in sys.argv[1].split(',') if s.strip()]; print(json.dumps(parts))" "$RAW")
          echo "suites=${JSON}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}"  >> "$GITHUB_OUTPUT"
          echo "Suites: ${JSON}  Image: ${IMAGE}"

  e2e:
    name: GNOME 50 — ${{ matrix.suite }}
    needs: matrix
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJson(needs.matrix.outputs.suites) }}

    env:
      IMAGE: ${{ needs.matrix.outputs.image }}
      SUITE: ${{ matrix.suite }}

    steps:
      # ── Always pull the latest testsuite — PRs fixing tests must be picked up ──
      - name: Checkout testsuite
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: projectbluefin/testsuite
          path: testsuite
          sparse-checkout: |
            tests/${{ matrix.suite }}
            tests/shared
          sparse-checkout-cone-mode: true

      # ── Free ~10 GB so BIB + QEMU disk fit on the runner ─────────────────────
      - name: Free disk space
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9

      # ── KVM + tools ──────────────────────────────────────────────────────────
      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      # Pull OCI image while apt installs QEMU — saves ~2 min in parallel
      - name: Install QEMU and pull OCI image
        run: |
          sudo podman pull "${IMAGE}" &
          PULL_PID=$!
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends qemu-system-x86
          wait $PULL_PID

      # ── SSH keypair for VM access ─────────────────────────────────────────────
      - name: Generate SSH keypair
        run: |
          ssh-keygen -t ed25519 -f /tmp/vm_key -N "" -C "e2e@gha"
          echo "VM_PUBKEY=$(cat /tmp/vm_key.pub)" >> "$GITHUB_ENV"

      # ── Install OCI image to disk and configure for testing ─────────────────
      # bootc install to-disk deploys the ostree layers but fails at the
      # bootloader step (bootupd is not in the dakota image).  We catch that,
      # verify the deployment was written, then copy kernel + initramfs out
      # so QEMU can boot directly with -kernel/-initrd (no OVMF required).
      - name: Install OCI image and configure disk
        run: |
          fallocate -l 30G disk.raw

          # Run bootc install — ignore the expected bootupd failure.
          # The ostree deployment is fully written before bootupd is invoked.
          sudo podman run \
            --rm --privileged --pid=host \
            --security-opt label=type:unconfined_t \
            -v /var/lib/containers:/var/lib/containers \
            -v /dev:/dev \
            -v "$(pwd):/data" \
            "${IMAGE}" bootc install to-disk \
              --via-loopback /data/disk.raw \
              --filesystem ext4 \
              --wipe \
              --bootloader systemd \
              --karg systemd.firstboot=no \
            || echo "bootc install exited $? (bootupd expected — continuing)"

          # ── Mount the disk ────────────────────────────────────────────────────
          LOOP=$(sudo losetup -f --show -P disk.raw)
          echo "Loop: ${LOOP}"
          sudo mkdir -p /mnt/root

          # Partition layout from bootc: p1=BIOS(1M) p2=EFI(512M) p3=root
          ROOT_PART="${LOOP}p3"
          ROOT_UUID=$(sudo blkid -s UUID -o value "${ROOT_PART}")
          echo "root=${ROOT_PART}  uuid=${ROOT_UUID}"

          sudo mount "${ROOT_PART}" /mnt/root

          # ── Verify deployment ─────────────────────────────────────────────────
          DEPLOY=$(sudo ls /mnt/root/ostree/deploy/default/deploy/ 2>/dev/null | head -1)
          if [[ -z "${DEPLOY}" ]]; then
            echo "ERROR: ostree deployment missing — bootc install failed before writing layers"
            sudo ls -la /mnt/root/ || true
            exit 1
          fi
          D="/mnt/root/ostree/deploy/default/deploy/${DEPLOY}"
          VAR="/mnt/root/ostree/deploy/default/var"
          KVER=$(ls "${D}/usr/lib/modules/" | head -1)
          echo "deploy=${DEPLOY}  kver=${KVER}"

          # Export ROOT_UUID and KVER for the QEMU boot step
          echo "ROOT_UUID=${ROOT_UUID}" >> "$GITHUB_ENV"
          echo "KVER=${KVER}" >> "$GITHUB_ENV"

          # ── Read bootc's generated BLS entry for the correct ostree= arg ────────
          # bootc writes the BLS entry to the ESP before the bootloader install
          # step fails.  Reading it preserves the full ostree= boot argument that
          # ostree-prepare-root needs to find the deployment at boot time.
          EFI_PART="${LOOP}p2"
          sudo mkdir -p /mnt/efi
          sudo mount "${EFI_PART}" /mnt/efi
          BLS_FILE=$(sudo find /mnt/efi/loader/entries -name '*.conf' 2>/dev/null | head -1)
          if [[ -n "${BLS_FILE}" ]]; then
            BLS_OPTS=$(sudo grep '^options' "${BLS_FILE}" | sed 's/^options //')
            echo "BLS entry: ${BLS_FILE}"
            echo "BLS opts:  ${BLS_OPTS}"
          else
            echo "WARNING: no BLS entry on ESP; constructing ostree= arg from deploy path"
            DEPLOY_HASH="${DEPLOY%.*}"
            BLS_OPTS="root=UUID=${ROOT_UUID} rw ostree=/ostree/boot.1/default/${DEPLOY_HASH}/0 systemd.firstboot=no"
          fi
          # Append CI-specific args: serial console + skip SELinux relabel
          KERNEL_ARGS="${BLS_OPTS} selinux=0 console=ttyS0,115200 quiet"
          echo "KERNEL_ARGS=${KERNEL_ARGS}" >> "$GITHUB_ENV"
          sudo umount /mnt/efi

          # ── Copy kernel + initramfs to workspace for direct QEMU boot ─────────
          sudo cp "${D}/usr/lib/modules/${KVER}/vmlinuz" ./vmlinuz
          sudo cp "${D}/usr/lib/modules/${KVER}/initramfs.img" ./initramfs.img
          sudo chown runner:runner ./vmlinuz ./initramfs.img

          # ── Enable sshd ───────────────────────────────────────────────────────
          sudo mkdir -p "${D}/etc/systemd/system/multi-user.target.wants/"
          sudo ln -sf /usr/lib/systemd/system/sshd.service \
            "${D}/etc/systemd/system/multi-user.target.wants/sshd.service"

          # ── Generate SSH host keys so sshd starts without delay ───────────────
          sudo ssh-keygen -A -f "${D}" 2>/dev/null || true

          # ── Create bluefin-test user (UID 1001) ───────────────────────────────
          BFT_UID=1001
          if ! sudo grep -q '^bluefin-test:' "${D}/etc/passwd" 2>/dev/null; then
            printf 'bluefin-test:x:%d:%d:Bluefin Test:/var/home/bluefin-test:/bin/bash\n' \
              "${BFT_UID}" "${BFT_UID}" | sudo tee -a "${D}/etc/passwd"
            printf 'bluefin-test:!:19000:0:99999:7:::\n' | sudo tee -a "${D}/etc/shadow"
            printf 'bluefin-test:x:%d:\n' "${BFT_UID}" | sudo tee -a "${D}/etc/group"
          fi

          # ── Inject SSH key ────────────────────────────────────────────────────
          sudo mkdir -p "${VAR}/home/bluefin-test/.ssh"
          sudo tee "${VAR}/home/bluefin-test/.ssh/authorized_keys" < /tmp/vm_key.pub
          sudo chown -R "${BFT_UID}:${BFT_UID}" "${VAR}/home/bluefin-test"
          sudo chmod 700 "${VAR}/home/bluefin-test/.ssh"
          sudo chmod 600 "${VAR}/home/bluefin-test/.ssh/authorized_keys"

          # ── SSH env forwarding (AT-SPI needs DBUS/WAYLAND vars over SSH) ──────
          sudo mkdir -p "${D}/etc/ssh/sshd_config.d/"
          echo 'PermitUserEnvironment yes' | \
            sudo tee "${D}/etc/ssh/sshd_config.d/99-bluefin-test.conf"

          # ── Passwordless sudo ─────────────────────────────────────────────────
          echo 'bluefin-test ALL=(ALL) NOPASSWD:ALL' | \
            sudo tee "${D}/etc/sudoers.d/bluefin-test"
          sudo chmod 440 "${D}/etc/sudoers.d/bluefin-test"

          # ── Pre-bake GDM autologin (no post-boot restart needed) ──────────────
          sudo mkdir -p "${D}/etc/gdm"
          printf '[daemon]\nAutomaticLoginEnable=True\nAutomaticLogin=bluefin-test\n' | \
            sudo tee "${D}/etc/gdm/custom.conf"

          # ── Mask services unused in CI to speed up first-boot systemd ─────────
          for svc in bluetooth cups avahi-daemon ModemManager fwupd colord; do
            sudo ln -sf /dev/null "${D}/etc/systemd/system/${svc}.service" 2>/dev/null || true
          done

          sudo umount /mnt/root
          sudo losetup -d "${LOOP}"
          sudo podman rmi "${IMAGE}" 2>/dev/null || true
          ls -lh disk.raw vmlinuz initramfs.img
          df -h .

      # ── Boot VM ───────────────────────────────────────────────────────────────
      # Direct kernel boot (-kernel/-initrd) skips OVMF/systemd-boot entirely.
      # Raw disk + iothread avoids qcow2 conversion and cuts I/O latency.
      # selinux=0 eliminates the multi-minute first-boot relabel that blocks SSH.
      # Serial log pre-created world-writable so root QEMU can write, runner can read.
      - name: Boot VM with QEMU + KVM
        run: |
          touch "$(pwd)/vm-serial.log"
          chmod 666 "$(pwd)/vm-serial.log"

          sudo qemu-system-x86_64 \
            -machine  q35,accel=kvm \
            -cpu      host \
            -m        4096 \
            -smp      4 \
            -kernel   ./vmlinuz \
            -initrd   ./initramfs.img \
            -append   "${KERNEL_ARGS}" \
            -object   iothread,id=ioth0 \
            -drive    if=none,id=disk,file=disk.raw,format=raw,cache=unsafe,aio=threads,discard=unmap \
            -device   virtio-blk-pci,drive=disk,iothread=ioth0 \
            -netdev   user,id=net0,hostfwd=tcp::2222-:22 \
            -device   virtio-net-pci,netdev=net0 \
            -device   virtio-gpu-pci \
            -display  none \
            -serial   file:$(pwd)/vm-serial.log \
            -daemonize \
            -pidfile  /tmp/qemu.pid
          echo "VM booting (pid=$(cat /tmp/qemu.pid))"

      # ── Wait for SSH ──────────────────────────────────────────────────────────
      # selinux=0 eliminates the relabel delay. SSH host keys are pre-generated.
      # ControlMaster is established here and reused by all subsequent SSH steps.
      - name: Wait for SSH
        run: |
          SSH_COMMON="-i /tmp/vm_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes -o ControlMaster=auto -o ControlPersist=600 -o ControlPath=/tmp/ssh-ctrl-%C -o ConnectTimeout=3"
          DEADLINE=$((SECONDS + 300))
          while [ $SECONDS -lt $DEADLINE ]; do
            if ssh ${SSH_COMMON} -p 2222 bluefin-test@127.0.0.1 "echo up" 2>/dev/null; then
              echo "SSH ready after ${SECONDS}s"
              exit 0
            fi
            sleep 3
          done
          echo "ERROR: SSH never became ready after 5 minutes"
          exit 1

      # ── Dump VM serial log (always — this is the primary boot debug output) ──
      - name: Dump VM serial log
        if: always()
        run: |
          echo "=== VM serial console output ==="
          cat "$(pwd)/vm-serial.log" 2>/dev/null || echo "(no serial log — QEMU may not have started)"

      # ── Wait for live Wayland session ────────────────────────────────────────
      # GDM autologin is pre-baked into the disk image; no restart needed.
      # Just wait for the Wayland socket to confirm the session is live.
      - name: Wait for GNOME session
        run: |
          SSH_COMMON="-i /tmp/vm_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes -o ControlMaster=auto -o ControlPersist=600 -o ControlPath=/tmp/ssh-ctrl-%C -o ConnectTimeout=3"
          SSH="ssh ${SSH_COMMON} -p 2222 bluefin-test@127.0.0.1"
          DEADLINE=$((SECONDS + 180))
          while [ $SECONDS -lt $DEADLINE ]; do
            if $SSH "test -S /run/user/1001/wayland-0" 2>/dev/null; then
              echo "GNOME session active after ${SECONDS}s"
              exit 0
            fi
            sleep 3
          done
          echo "ERROR: GNOME session did not start within 3 minutes"
          $SSH "journalctl -u gdm --no-pager -n 50" 2>/dev/null || true
          exit 1

      # ── Install Python test stack inside the VM ──────────────────────────────
      # dakota is built from gnome-build-meta/freedesktop-sdk — no RPM, no dnf,
      # no Fedora.  gnome-ponytail-daemon must already be in the image.
      # Python test deps are installed via pip into the user's home directory.
      # qecore-headless manages ponytail daemon lifecycle itself; do not pre-start it.
      - name: Install Python test stack
        run: |
          SSH_COMMON="-i /tmp/vm_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes -o ControlMaster=auto -o ControlPersist=600 -o ControlPath=/tmp/ssh-ctrl-%C -o ConnectTimeout=3"
          SSH="ssh ${SSH_COMMON} -p 2222 bluefin-test@127.0.0.1"

          $SSH "python3 -m ensurepip --user 2>/dev/null || true"
          $SSH "python3 -m pip install -q --user qecore behave dogtail python-uinput"
          $SSH "for f in \$HOME/.local/bin/qecore_*; do sudo ln -sf \"\$f\" /usr/local/bin/\$(basename \"\$f\") 2>/dev/null; done"
          $SSH "sudo modprobe uinput 2>/dev/null || true"
          $SSH "sudo chmod 0666 /dev/uinput 2>/dev/null || true"

          # Capture session env so the test run step can pass it to qecore-headless.
          $SSH "
            XDG=/run/user/1001
            SESSION_BUS=\$(systemctl --user show-environment 2>/dev/null \
              | grep '^DBUS_SESSION_BUS_ADDRESS=' | head -1 | cut -d= -f2-)
            [[ -z \"\${SESSION_BUS}\" ]] && SESSION_BUS=\"unix:path=\${XDG}/bus\"
            WAYLAND_DISP=\$(ls /run/user/1001/wayland-* 2>/dev/null \
              | head -1 | xargs basename 2>/dev/null || echo wayland-0)
            printf 'export DBUS_SESSION_BUS_ADDRESS=%s\nexport WAYLAND_DISPLAY=%s\nexport XDG_RUNTIME_DIR=%s\nexport AT_SPI_BUS_ADDRESS=%s\n' \
              \"\${SESSION_BUS}\" \"\${WAYLAND_DISP}\" \"\${XDG}\" \"\${SESSION_BUS}\" \
              > /tmp/session.env
            echo 'Session env saved to /tmp/session.env'
            cat /tmp/session.env
          "

      # ── Run the testsuite ─────────────────────────────────────────────────────
      - name: Copy testsuite and run behave via qecore-headless
        id: run
        run: |
          SSH_COMMON="-i /tmp/vm_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=yes -o ControlMaster=auto -o ControlPersist=600 -o ControlPath=/tmp/ssh-ctrl-%C -o ConnectTimeout=3"
          SSH="ssh ${SSH_COMMON} -p 2222 bluefin-test@127.0.0.1"
          SCP="scp -i /tmp/vm_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ControlPath=/tmp/ssh-ctrl-%C -P 2222 -r"
          mkdir -p results

          $SSH "mkdir -p /tmp/bluefin-tests /tmp/results"
          $SCP "testsuite/tests/${SUITE}" "bluefin-test@127.0.0.1:/tmp/bluefin-tests/"
          # Copy shared modules if present (some suites import from tests/shared)
          [[ -d "testsuite/tests/shared" ]] && \
            $SCP "testsuite/tests/shared" "bluefin-test@127.0.0.1:/tmp/bluefin-tests/" || true

          BEHAVE_RC=0
          $SSH "
            set -e
            source /tmp/session.env
            export PATH=\$HOME/.local/bin:\$PATH
            BEHAVE_BIN=\$(which behave)
            \$HOME/.local/bin/qecore-headless \"\$BEHAVE_BIN /tmp/bluefin-tests/${SUITE}/features/ --format json.pretty --outfile /tmp/results/results.json --format pretty --outfile /tmp/results/results.txt --no-capture\"
          " || BEHAVE_RC=$?

          $SCP "bluefin-test@127.0.0.1:/tmp/results/." ./results/ 2>/dev/null || true
          echo "behave_rc=${BEHAVE_RC}" >> "$GITHUB_OUTPUT"

      # ── Results ───────────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          if [[ -f results/results.json ]]; then
            python3 - << 'PY'
          import json, os
          data    = json.load(open('results/results.json'))
          failed  = sum(1 for f in data for s in f.get('elements', []) if s.get('status') == 'failed')
          skipped = sum(1 for f in data for s in f.get('elements', []) if s.get('status') == 'skipped')
          total   = sum(len(f.get('elements', [])) for f in data)
          passed  = total - failed - skipped
          suite   = os.environ.get('SUITE', 'smoke')
          icon    = '✅' if failed == 0 else '❌'

          lines = [
            f'## {icon} E2E Results — GNOME 50 ({suite})', '',
            '| Result | Count |', '|--------|-------|',
            f'| ✅ Passed  | {passed} |',
            f'| ❌ Failed  | {failed} |',
            f'| ⏭️ Skipped | {skipped} |',
            f'| **Total** | **{total}** |',
          ]
          if failed:
            lines += ['', '### Failed scenarios', '']
            for feat in data:
              for s in feat.get('elements', []):
                if s.get('status') == 'failed':
                  lines.append(f"- **{feat['name']}** › {s['name']}")
                  for step in s.get('steps', []):
                    if step.get('result', {}).get('status') == 'failed':
                      err = step['result'].get('error_message', '').strip()[:500]
                      lines.append(f"  - `{step['name']}`")
                      if err:
                        lines.append(f"    <pre>{err}</pre>")
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
            f.write('\n'.join(lines) + '\n')
          PY
          else
            echo "## ⚠️ No results.json — test run did not complete" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>VM serial console output</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -150 "$(pwd)/vm-serial.log" 2>/dev/null >> "$GITHUB_STEP_SUMMARY" || echo "(no serial log)" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-results-${{ env.SUITE }}
          path: results/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload serial log artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vm-serial-log-${{ matrix.suite }}
          path: vm-serial.log
          retention-days: 3
          if-no-files-found: ignore

      - name: Fail job if tests failed
        if: steps.run.outputs.behave_rc != '0'
        run: exit "${{ steps.run.outputs.behave_rc }}"
