# E2E Tests — GNOME 50
#
# Delegates to the projectbluefin/testsuite reusable workflow.
# All VM provisioning, QEMU boot, session setup, and test execution is
# handled there — see:
#   https://github.com/projectbluefin/testsuite/tree/main/.github/actions/gnome-e2e
#
# PRs run 'smoke'. workflow_dispatch can run any supported GUI suite.

name: E2E Tests — GNOME 50

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      image:
        description: "OCI image to test (default: dakota:testing)"
        required: false
        default: "ghcr.io/projectbluefin/dakota:testing"
      suites:
        description: "Comma-separated GUI suites: smoke,developer,dx,software,vanilla-gnome"
        required: false
        default: "smoke"

permissions:
  contents: read
  packages: write  # testsuite pushes desktop screenshot to GHCR

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  should-run:
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.check.outputs.result }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "result=true" >> "$GITHUB_OUTPUT"
          else
            changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- \
              elements/ files/ patches/ Justfile project.conf | wc -l)
            echo "result=$([[ $changed -gt 0 ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          fi

  e2e:
    needs: should-run
    if: needs.should-run.outputs.result == 'true'
    uses: projectbluefin/testsuite/.github/workflows/e2e.yml@e7f46eac7266809401d22db3f9f14e87ccfb8d63 # main
    with:
      image: ${{ github.event.inputs.image || 'ghcr.io/projectbluefin/dakota:testing' }}
      suites: ${{ github.event.inputs.suites || 'smoke' }}
